# Local production-like stack: Django (gunicorn + WhiteNoise) + Postgres.
# Mirrors the Render deploy so you can verify the container before pushing.
#   docker compose up --build   ->  http://localhost:8000
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: otsu
      POSTGRES_USER: otsu
      POSTGRES_PASSWORD: otsu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otsu"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: local-compose-secret-not-for-prod
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8000"
      DATABASE_URL: "postgres://otsu:otsu@db:5432/otsu"
      RUN_SEED: "1"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
