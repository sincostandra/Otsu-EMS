# Render Blueprint: one Docker web service + one managed Postgres.
# Dashboard -> New + -> Blueprint -> pick this repo -> Apply.
# Docs: https://render.com/docs/blueprint-spec
databases:
  - name: otsu-ems-db
    plan: free
    databaseName: otsu
    user: otsu

services:
  - type: web
    name: otsu-ems
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Generated once by Render and kept stable across deploys.
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      # Wired automatically from the managed Postgres above.
      - key: DATABASE_URL
        fromDatabase:
          name: otsu-ems-db
          property: connectionString
      # Free instance has ~512MB RAM; keep the worker count small.
      - key: WEB_CONCURRENCY
        value: "2"
      # Seed the demo workforce on first boot. Set to 0 after the first deploy
      # so later deploys don't re-run the seed.
      - key: RUN_SEED
        value: "1"
      # Demo credentials — set the values in the Render dashboard (sync: false
      # keeps them out of the repo). See README for the login table.
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_EMPLOYEE_PASSWORD
        sync: false
